<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Method — Charts</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080a;--surface:#0c0f12;--border:#1a1e24;--border-hover:#2a3038;
  --text:#c8cdd3;--text-dim:#5a6370;--text-bright:#edf0f3;
  --green:#34d399;--green-bg:#0a1f17;--blue:#60a5fa;--blue-bg:#0c1929;
  --yellow:#fbbf24;--yellow-bg:#1a1608;--red:#f87171;
  --accent:#34d399;--accent-dim:#1a3d2e;
  --font-mono:'JetBrains Mono',monospace;--font-sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.top-bar{padding:16px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.top-bar-left{display:flex;align-items:center;gap:16px}
.logo{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);padding:5px 10px;border-radius:4px;border:1px solid #1a3d2e}
.nav-links{display:flex;gap:8px}
.nav-links a{color:var(--text-dim);text-decoration:none;font-size:13px;padding:4px 12px;border-radius:4px;transition:all .15s}
.nav-links a:hover{color:var(--text)}
.nav-links a.active{background:var(--accent-dim);color:var(--accent)}
#bq-status{font-family:var(--font-mono);font-size:11px}

.page{padding:32px;max-width:1400px;margin:0 auto}
h2{font-size:16px;font-weight:700;color:var(--text-bright);margin-bottom:16px;letter-spacing:-.01em}
h3{font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:8px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em}

.section{margin-bottom:40px;padding:24px;background:var(--surface);border:1px solid var(--border);border-radius:10px}

/* Chart grid */
.chart-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.chart-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.chart-card h3{margin-bottom:10px;font-size:12px}
.chart-card canvas{width:100%!important;height:220px!important}
.chart-card .stat{font-family:var(--font-mono);font-size:20px;font-weight:700;color:var(--text-bright);margin-bottom:8px}
.chart-card .stat-label{font-size:11px;color:var(--text-dim)}

/* Controls */
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-label{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em}
.ctrl-btn{background:var(--bg);border:1px solid var(--border);color:var(--text-dim);padding:5px 14px;border-radius:4px;cursor:pointer;font-family:var(--font-mono);font-size:11px;transition:all .15s}
.ctrl-btn:hover{border-color:var(--border-hover);color:var(--text)}
.ctrl-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.ctrl-btn.dim-active{background:#1a0f2e;border-color:#a78bfa;color:#a78bfa}
select.ctrl-select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:4px;font-size:12px;outline:none}
select.ctrl-select:focus{border-color:var(--accent)}

/* Builder */
.builder-layout{display:grid;grid-template-columns:280px 1fr;gap:20px;min-height:400px}
.builder-sidebar{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;overflow-y:auto;max-height:500px}
.builder-main{position:relative}
.builder-main canvas{width:100%!important;height:400px!important}
.metric-checkbox{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:4px;cursor:pointer;font-size:12px;transition:background .1s}
.metric-checkbox:hover{background:var(--surface)}
.metric-checkbox input{accent-color:var(--accent)}
.metric-checkbox .badge{font-family:var(--font-mono);font-size:9px;padding:1px 6px;border-radius:3px;margin-left:auto}

/* Validation */
.val-tree{font-family:var(--font-mono);font-size:12px;line-height:2;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:8px}
.val-tree .indent{margin-left:20px;border-left:1px solid var(--border);padding-left:12px}
.val-btn{background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);padding:6px 16px;border-radius:6px;cursor:pointer;font-family:var(--font-mono);font-size:11px;font-weight:600;transition:all .15s}
.val-btn:hover{filter:brightness(1.2)}
.val-btn.danger{background:#1c0c0c;border-color:var(--red);color:var(--red)}
.val-results{margin-top:12px}
.val-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
.val-row .name{color:var(--text)}
.val-row .val{font-family:var(--font-mono);color:var(--text-bright)}
.val-row .changed{color:var(--yellow)}

.loading-msg{color:var(--text-dim);font-size:12px;font-family:var(--font-mono);padding:20px;text-align:center}
</style>
</head>

<script>
// --- Config ---
const SUPABASE_URL = 'https://agkubdpgnpwudzpzcvhs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFna3ViZHBnbnB3dWR6cHpjdmhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDU4MzEsImV4cCI6MjA4ODk4MTgzMX0.tfpIArmqYQn7IHOrIUY6L-Wc4HcpMLXiTR6vKPJLDjY';
const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };
const BQ_CLIENT_ID = '546732685010-nojjfak7esmun2taour8r5pakrsrg3aq.apps.googleusercontent.com';
const PALETTE = ['#34d399','#60a5fa','#fbbf24','#f87171','#a78bfa','#38bdf8','#fb923c','#e879f9','#4ade80','#f472b6','#818cf8','#22d3ee'];

let allMetrics = [];
let bqToken = null;
let charts = {};

// --- Supabase ---
async function loadMetrics() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/metrics?select=*&order=id`, { headers: HEADERS });
  allMetrics = await res.json();
}

// --- BQ Auth ---
function initBqAuth() {
  const stored = localStorage.getItem('bq_access_token');
  if (stored) { bqToken = stored; updateBqStatus(); }
}

function connectBq() {
  if (!window.google?.accounts?.oauth2) return;
  google.accounts.oauth2.initTokenClient({
    client_id: BQ_CLIENT_ID,
    scope: 'https://www.googleapis.com/auth/bigquery',
    callback: (r) => { if (r.access_token) { bqToken = r.access_token; localStorage.setItem('bq_access_token', bqToken); updateBqStatus(); renderPage(); } },
  }).requestAccessToken();
}

function updateBqStatus() {
  const el = document.getElementById('bq-status');
  if (el) el.innerHTML = bqToken
    ? '<span style="color:var(--green)">&#9679; BQ Connected</span>'
    : '<button onclick="connectBq()" style="background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);padding:4px 12px;border-radius:4px;cursor:pointer;font-family:var(--font-mono);font-size:11px">Connect BigQuery</button>';
}

function cleanSqlText(sql) {
  return sql.replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"').replace(/\u2260/g,'!=').replace(/\u2265/g,'>=').replace(/\u2264/g,'<=');
}

async function queryBq(sql) {
  if (!bqToken) return null;
  const clean = cleanSqlText(sql);
  const res = await fetch('https://bigquery.googleapis.com/bigquery/v2/projects/project-for-method-dw/queries', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${bqToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: clean, useLegacySql: false, maxResults: 10000 }),
  });
  if (!res.ok) {
    if (res.status === 401) { bqToken = null; localStorage.removeItem('bq_access_token'); }
    throw new Error(`BQ ${res.status}`);
  }
  const data = await res.json();
  if (!data.rows) return [];
  const fields = data.schema.fields.map(f => f.name);
  return data.rows.map(r => { const o = {}; fields.forEach((f,i) => o[f] = r.f[i].v); return o; });
}

// --- Helpers ---
function getPrimitives() { return allMetrics.filter(m => m.metric_type === 'primitive'); }
function getFoundationals() { return allMetrics.filter(m => m.metric_type === 'foundational'); }
function getDerived() { return allMetrics.filter(m => m.metric_type === 'derived' && m.formula); }
function getDimensions() { return allMetrics.filter(m => m.metric_type === 'dimension'); }
function getTimeDims() { return getDimensions().filter(d => d.required_column === '_DATE_'); }
function getGroupDims() { return getDimensions().filter(d => d.required_column !== '_DATE_'); }
function metricName(id) { const m = allMetrics.find(x => x.id === id); return m ? m.name : '#'+id; }

function destroyChart(key) { if (charts[key]) { charts[key].destroy(); delete charts[key]; } }

function chartOpts(opts = {}) {
  return {
    responsive: true, maintainAspectRatio: false,
    indexAxis: opts.horizontal ? 'y' : 'x',
    plugins: {
      legend: { display: opts.legend !== false, labels: { color: '#c8cdd3', font: { size: 11 } } },
      title: opts.title ? { display: true, text: opts.title, color: '#888', font: { size: 11 } } : { display: false },
    },
    scales: {
      x: { ticks: { color: '#5a6370', font: { size: 10 }, maxRotation: 45 }, grid: { color: '#1a1e24' } },
      y: { ticks: { color: '#5a6370', font: { size: 10 } }, grid: { color: '#1a1e24' }, beginAtZero: true },
    },
  };
}

// --- Build SQL for a metric + dimension ---
// Column cache per view
const _colCache = {};
async function getViewCols(viewName) {
  if (_colCache[viewName]) return _colCache[viewName];
  const r = await queryBq(`SELECT column_name, data_type FROM \`project-for-method-dw.revenue.INFORMATION_SCHEMA.COLUMNS\` WHERE table_name='${viewName}'`);
  _colCache[viewName] = r.map(x => ({ name: x.column_name, type: x.data_type }));
  return _colCache[viewName];
}

function getAgg(metric) {
  return metric.agg_expression || 'COUNT(*)';
}

function detectDateCol(cols) {
  const dateCols = cols.filter(c => ['DATE','TIMESTAMP','DATETIME'].includes(c.type));
  return dateCols[0]?.name || null;
}

// Get time parts from a time dimension's JSON view_definition
function getTimeParts(timeDim, dateCol) {
  if (!timeDim?.view_definition) return { select: '', group: '', order: '', where: '' };
  try {
    const parts = JSON.parse(timeDim.view_definition);
    return {
      select: (parts.select || '').replace(/\{date\}/g, dateCol),
      group: (parts.group || '').replace(/\{date\}/g, dateCol),
      order: (parts.order || '').replace(/\{date\}/g, dateCol),
      where: (parts.where || '').replace(/\{date\}/g, dateCol),
    };
  } catch {
    return { select: '', group: '', order: '', where: '' };
  }
}

async function queryMetricWithDim(metric, timeDim, groupDim, extraWhere) {
  if (!metric.view_name) return [];
  const table = `\`project-for-method-dw.revenue.${metric.view_name}\``;

  let cols;
  try { cols = await getViewCols(metric.view_name); } catch { return []; }
  const dc = detectDateCol(cols);
  const agg = getAgg(metric);

  // Always use a group template. Default to "No Grouping" if none selected.
  const template = groupDim?.view_definition
    || allMetrics.find(m => m.name === 'No Grouping' && m.metric_type === 'dimension')?.view_definition
    || 'SELECT {time_select} {agg} AS value FROM {table} {time_where} GROUP BY {time_group} 1 ORDER BY {time_order} 1 LIMIT 500';

  // If the template contains _date (attribution unpivot), time parts should reference _date
  const timeCol = template.includes('_date') ? '_date' : (dc || 'SignupDate');
  const timeParts = getTimeParts(timeDim, timeCol);

  let sql = template
    .replace(/\{table\}/g, table)
    .replace(/\{date\}/g, dc || 'SignupDate')
    .replace(/\{agg\}/g, agg)
    .replace(/\{time_select\}/g, timeParts.select)
    .replace(/\{time_group\}/g, timeParts.group)
    .replace(/\{time_order\}/g, timeParts.order)
    .replace(/\{time_where\}/g, timeParts.where);

  // Add extra WHERE filter if provided (e.g., channel filter)
  if (extraWhere) {
    if (sql.toUpperCase().includes('WHERE')) {
      sql = sql.replace(/WHERE/i, `WHERE ${extraWhere} AND`);
    } else {
      sql = sql.replace(/GROUP BY/i, `WHERE ${extraWhere} GROUP BY`);
    }
  }

  return await queryBq(sql);
}

// --- Compute derived metric ---
async function queryDerivedWithDim(derived, timeDim, groupDim, extraWhere) {
  if (!derived.depends_on || !derived.formula) return [];
  const depIds = derived.depends_on;
  const depMetrics = depIds.map(id => allMetrics.find(m => m.id === id)).filter(Boolean);
  if (depMetrics.length === 0) return [];

  // Query each dependency with the same dimension
  // Only apply extraWhere if the primitive's view has the required column
  const results = {};
  for (const dep of depMetrics) {
    let depWhere = extraWhere;
    if (depWhere && dep.view_name) {
      try {
        const cols = await getViewCols(dep.view_name);
        const colName = depWhere.split(/\s/)[0]; // e.g., "Att_Pay_Per_Click" from "Att_Pay_Per_Click > 0"
        if (!cols.some(c => c.name === colName)) depWhere = null; // column doesn't exist, skip filter
      } catch { depWhere = null; }
    }
    results[dep.id] = await queryMetricWithDim(dep, timeDim, groupDim, depWhere);
  }

  // Get time labels from the first dependency
  const firstResult = results[depMetrics[0].id] || [];
  const timeCol = Object.keys(firstResult[0] || {}).find(k => k !== 'value') || 'period';

  return firstResult.map(row => {
    const label = row[timeCol];
    let formula = derived.formula;
    for (const dep of depMetrics) {
      const depRow = (results[dep.id] || []).find(r => r[timeCol] === label);
      const val = depRow ? parseFloat(depRow.value) || 0 : 0;
      formula = formula.replace(new RegExp(`\\{${dep.id}\\}`, 'g'), String(val));
    }
    let computed = 0;
    try {
      // SAFE_DIVIDE(a, b) → b === 0 ? 0 : a / b
      const safeFormula = formula.replace(/SAFE_DIVIDE\(\s*([^,]+)\s*,\s*([^)]+)\s*\)/g, '(($2)===0?0:($1)/($2))');
      computed = Function('"use strict"; return (' + safeFormula + ')')();
      if (!isFinite(computed)) computed = 0;
    } catch { computed = 0; }
    return { [timeCol]: label, value: Math.round(computed * 100) / 100 };
  });
}

// --- State ---
const ATT_CHANNELS = ['All','SEO','PPC','OPN','Social','Email','Referral','Direct','Partners','Content','Remarketing','Other','None'];
const ATT_COL_MAP = { SEO:'Att_SEO', PPC:'Att_Pay_Per_Click', OPN:'Att_OPN_Other_Peoples_Networks', Social:'Att_Social', Email:'Att_Email', Referral:'Att_Referral_Link', Direct:'Att_Direct', Partners:'Att_Partners', Content:'Att_Content', Remarketing:'Att_Remarketing', Other:'Att_Other', None:'Att_None' };
let interactiveState = { timeDim: null, groupDim: null, channelFilter: 'All' };
let builderState = { selectedMetrics: new Set(), timeDim: null, groupDim: null };

// --- Render ---
async function renderPage() {
  const app = document.getElementById('app');
  if (!bqToken) {
    app.innerHTML = '<div class="loading-msg">Connect BigQuery to view charts</div>';
    updateBqStatus();
    return;
  }

  app.innerHTML = `
    <div class="section" id="sec-funnel">
      <h2>Funnel</h2>
      <div class="controls" id="funnel-controls"></div>
      <div style="height:350px;position:relative"><canvas id="funnel-canvas"></canvas></div>
    </div>

    <div class="section" id="sec-rates">
      <h2>Rates</h2>
      <div class="controls" id="rates-controls"></div>
      <div style="height:350px;position:relative"><canvas id="rates-canvas"></canvas></div>
    </div>

    <div class="section" id="sec-builder">
      <h2>Chart Builder</h2>
      <div class="controls" id="builder-controls"></div>
      <div class="builder-layout">
        <div class="builder-sidebar" id="builder-sidebar"></div>
        <div class="builder-main">
          <div id="builder-error"></div>
          <canvas id="builder-canvas"></canvas>
        </div>
      </div>
    </div>
  `;

  renderFunnelControls();
  renderRatesControls();
  renderFunnelChart();
  renderRatesChart();
  renderBuilderControls();
  renderBuilderSidebar();
}

// --- Section 1: Funnel (Trials + Syncs + Conversions on one chart) ---
const FUNNEL_METRICS = [
  { id: 54, label: 'Trials', color: '#34d399' },
  { id: 55, label: 'Syncs', color: '#60a5fa' },
  { id: 56, label: 'Conversions', color: '#fbbf24' },
];
const RATE_METRICS = [
  { id: 20, label: 'Conversion Rate', color: '#34d399' },
  { id: 25, label: 'Sync Rate', color: '#60a5fa' },
  { id: 46, label: 'Churn Rate', color: '#f87171' },
];

function renderFunnelControls() {
  const timeDims = getTimeDims();
  const el = document.getElementById('funnel-controls');
  if (!interactiveState.timeDim) interactiveState.timeDim = timeDims.find(d => d.name === 'Monthly');

  el.innerHTML = `
    <span class="ctrl-label">Time</span>
    ${timeDims.map(d => `<button class="ctrl-btn ${interactiveState.timeDim?.id===d.id?'active':''}" onclick="setFunnelTime(${d.id})">${d.name}</button>`).join('')}
  `;
}

function setFunnelTime(dimId) {
  interactiveState.timeDim = allMetrics.find(m => m.id === dimId);
  renderFunnelControls();
  renderRatesControls();
  renderFunnelChart();
  renderRatesChart();
}

async function renderFunnelChart() {
  destroyChart('funnel');
  const canvas = document.getElementById('funnel-canvas');
  const datasets = [];
  let allLabels = [];

  for (const fm of FUNNEL_METRICS) {
    const m = allMetrics.find(x => x.id === fm.id);
    if (!m) continue;
    const rows = await queryMetricWithDim(m, interactiveState.timeDim, null);
    if (!rows || rows.length === 0) continue;

    const rcols = Object.keys(rows[0]);
    const valueCol = rcols.find(c => c === 'value') || rcols[rcols.length - 1];
    const labelCol = rcols.find(c => c !== valueCol);
    const labels = rows.map(r => r[labelCol]);
    const data = rows.map(r => parseFloat(r[valueCol]) || 0);
    if (labels.length > allLabels.length) allLabels = labels;

    datasets.push({
      label: fm.label, data, borderColor: fm.color,
      backgroundColor: fm.color + '20', tension: .3, fill: false, pointRadius: 3,
    });
  }

  charts['funnel'] = new Chart(canvas, {
    type: 'line',
    data: { labels: allLabels, datasets },
    options: chartOpts({ legend: true }),
  });
}

function renderRatesControls() {
  const el = document.getElementById('rates-controls');
  if (!el) return;
  el.innerHTML = `
    <span class="ctrl-label">Attribution Channel</span>
    <select class="ctrl-select" onchange="setChannelFilter(this.value)">
      ${ATT_CHANNELS.map(c => `<option value="${c}" ${interactiveState.channelFilter===c?'selected':''}>${c}</option>`).join('')}
    </select>
  `;
}

function setChannelFilter(channel) {
  interactiveState.channelFilter = channel;
  renderRatesChart();
}

async function renderRatesChart() {
  destroyChart('rates');
  const canvas = document.getElementById('rates-canvas');
  const datasets = [];
  let allLabels = [];

  for (const rm of RATE_METRICS) {
    const m = allMetrics.find(x => x.id === rm.id);
    if (!m) continue;
    // Build channel filter
    const ch = interactiveState.channelFilter;
    const channelWhere = (ch && ch !== 'All' && ATT_COL_MAP[ch]) ? `${ATT_COL_MAP[ch]} > 0` : null;
    const rows = await queryDerivedWithDim(m, interactiveState.timeDim, null, channelWhere);
    if (!rows || rows.length === 0) continue;

    const rcols = Object.keys(rows[0]);
    const valueCol = rcols.find(c => c === 'value') || rcols[rcols.length - 1];
    const labelCol = rcols.find(c => c !== valueCol);
    const labels = rows.map(r => r[labelCol]);
    const data = rows.map(r => parseFloat(r[valueCol]) || 0);
    if (labels.length > allLabels.length) allLabels = labels;

    datasets.push({
      label: rm.label, data, borderColor: rm.color,
      backgroundColor: rm.color + '20', tension: .3, fill: false, pointRadius: 3,
    });
  }

  charts['rates'] = new Chart(canvas, {
    type: 'line',
    data: { labels: allLabels, datasets },
    options: chartOpts({ legend: true }),
  });
}

// --- Section 3: Chart Builder ---
function renderBuilderControls() {
  const timeDims = getTimeDims();
  const groupDims = getGroupDims();
  const el = document.getElementById('builder-controls');

  el.innerHTML = `
    <span class="ctrl-label">Time</span>
    ${timeDims.map(d => `<button class="ctrl-btn ${builderState.timeDim?.id===d.id?'active':''}" onclick="setBuilderTime(${d.id})">${d.name}</button>`).join('')}
    <span class="ctrl-label" style="margin-left:12px">Group by</span>
    <button class="ctrl-btn ${!builderState.groupDim?'dim-active':''}" onclick="setBuilderGroup(null)">None</button>
    ${groupDims.map(d => `<button class="ctrl-btn ${builderState.groupDim?.id===d.id?'dim-active':''}" onclick="setBuilderGroup(${d.id})">${d.name}</button>`).join('')}
  `;

  if (!builderState.timeDim) builderState.timeDim = timeDims.find(d => d.name === 'Monthly');
}

function renderBuilderSidebar() {
  const el = document.getElementById('builder-sidebar');
  const metrics = [...getPrimitives(), ...getFoundationals(), ...getDerived()];
  el.innerHTML = '<h3>Select Metrics</h3>' + metrics.map(m => {
    const checked = builderState.selectedMetrics.has(m.id);
    const typeLabel = m.metric_type;
    const typeColor = { primitive: 'var(--green)', foundational: '#38bdf8', derived: 'var(--yellow)' }[typeLabel] || 'var(--text-dim)';
    return `<label class="metric-checkbox">
      <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleBuilderMetric(${m.id})">
      <span>${m.name}</span>
      <span class="badge" style="color:${typeColor};border:1px solid ${typeColor}30;background:${typeColor}10">${typeLabel}</span>
    </label>`;
  }).join('');
}

function toggleBuilderMetric(id) {
  if (builderState.selectedMetrics.has(id)) builderState.selectedMetrics.delete(id);
  else builderState.selectedMetrics.add(id);
  renderBuilderChart();
}

function setBuilderTime(dimId) {
  const dim = allMetrics.find(m => m.id === dimId);
  // Radio behavior — toggle off if clicking the same one
  builderState.timeDim = (builderState.timeDim?.id === dimId) ? null : dim;
  renderBuilderControls();
  renderBuilderChart();
}

function setBuilderGroup(dimId) {
  builderState.groupDim = dimId ? allMetrics.find(m => m.id === dimId) : null;
  renderBuilderControls();
  renderBuilderChart();
}

async function renderBuilderChart() {
  if (builderState.selectedMetrics.size === 0) return;

  const canvas = document.getElementById('builder-canvas');
  const errEl = document.getElementById('builder-error');
  destroyChart('builder');
  if (errEl) errEl.textContent = '';

  const errors = [];
  const hasTime = !!builderState.timeDim;
  const hasGroup = !!builderState.groupDim;

  // Collect all query results
  const allResults = [];
  for (const metricId of builderState.selectedMetrics) {
    const m = allMetrics.find(x => x.id === metricId);
    if (!m) continue;
    try {
      let rows;
      if (m.formula) { rows = await queryDerivedWithDim(m, builderState.timeDim, builderState.groupDim); }
      else { rows = await queryMetricWithDim(m, builderState.timeDim, builderState.groupDim); }
      if (!rows || rows.length === 0) { errors.push(`${m.name}: no data`); continue; }
      allResults.push({ metric: m, rows });
    } catch (e) {
      errors.push(`${m.name}: ${e.message}`);
    }
  }

  if (errEl && errors.length > 0) {
    errEl.innerHTML = errors.map(e => `<div style="color:var(--red);font-size:11px">${e}</div>`).join('');
  }
  if (allResults.length === 0) return;

  // Determine columns
  const sampleCols = Object.keys(allResults[0].rows[0]);
  const valueCol = sampleCols.find(c => c === 'value') || sampleCols[sampleCols.length - 1];
  const nonValueCols = sampleCols.filter(c => c !== valueCol);

  let chartType, datasets, labels;

  if (hasTime && hasGroup && nonValueCols.length >= 2) {
    // TIME + GROUP → grouped bar chart
    // Columns: [timeCol, groupCol, value]
    const timeCol = nonValueCols[0];
    const groupCol = nonValueCols[1];
    const firstResult = allResults[0];
    const timeLabels = [...new Set(firstResult.rows.map(r => r[timeCol]))];
    const groupValues = [...new Set(firstResult.rows.map(r => r[groupCol]))].slice(0, 12);

    labels = timeLabels;
    datasets = [];
    let ci = 0;
    for (const res of allResults) {
      for (const gv of groupValues) {
        datasets.push({
          label: allResults.length > 1 ? `${res.metric.name} — ${gv || '(none)'}` : (gv || '(none)'),
          data: timeLabels.map(tl => {
            const row = res.rows.find(r => r[timeCol] === tl && r[groupCol] === gv);
            return row ? parseFloat(row[valueCol]) || 0 : 0;
          }),
          backgroundColor: PALETTE[ci % PALETTE.length] + 'cc',
          borderColor: PALETTE[ci % PALETTE.length],
          borderWidth: 1,
        });
        ci++;
      }
    }
    chartType = 'bar';

  } else if (hasGroup && !hasTime) {
    // GROUP only → horizontal bar
    const labelCol = nonValueCols[0];
    const firstResult = allResults[0];
    labels = firstResult.rows.map(r => r[labelCol]).slice(0, 20);

    datasets = [];
    let ci = 0;
    for (const res of allResults) {
      datasets.push({
        label: res.metric.name,
        data: labels.map(l => {
          const row = res.rows.find(r => r[labelCol] === l);
          return row ? parseFloat(row[valueCol]) || 0 : 0;
        }),
        backgroundColor: PALETTE[ci % PALETTE.length] + 'cc',
        borderColor: PALETTE[ci % PALETTE.length],
        borderWidth: 1,
      });
      ci++;
    }
    chartType = 'bar';

  } else {
    // TIME only (or fallback) → line chart, one line per metric
    const labelCol = nonValueCols[0];
    labels = [];
    datasets = [];
    let ci = 0;
    for (const res of allResults) {
      const l = res.rows.map(r => r[labelCol]);
      const d = res.rows.map(r => parseFloat(r[valueCol]) || 0);
      if (l.length > labels.length) labels = l;
      datasets.push({
        label: res.metric.name, data: d,
        borderColor: PALETTE[ci % PALETTE.length],
        backgroundColor: PALETTE[ci % PALETTE.length] + '20',
        tension: .3, fill: false, pointRadius: 3,
      });
      ci++;
    }
    chartType = 'line';
  }

  charts['builder'] = new Chart(canvas, {
    type: chartType,
    data: { labels, datasets },
    options: chartOpts({ legend: true, horizontal: hasGroup && !hasTime }),
  });
}


// --- Init ---
initBqAuth();
loadMetrics().then(() => { renderPage(); }).catch(e => {
  document.getElementById('app').innerHTML = `<div class="loading-msg" style="color:var(--red)">Failed: ${e.message}</div>`;
});
</script>
</body>
</html>
