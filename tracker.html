<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Method — Metric Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06080a;--surface:#0c0f12;--border:#1a1e24;--border-hover:#2a3038;
  --text:#c8cdd3;--text-dim:#5a6370;--text-bright:#edf0f3;
  --green:#34d399;--green-bg:#0a1f17;--blue:#60a5fa;--blue-bg:#0c1929;
  --yellow:#fbbf24;--yellow-bg:#1a1608;--red:#f87171;--red-bg:#1c0c0c;
  --gray:#4b5563;--gray-bg:#111318;
  --accent:#34d399;--accent-dim:#1a3d2e;
  --font-mono:'JetBrains Mono',monospace;--font-sans:'DM Sans',sans-serif;
}
html{font-size:13px}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;overflow-x:hidden}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-hover)}

/* Header */
.header{padding:28px 32px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-end;justify-content:space-between;gap:24px}
.header-left{display:flex;align-items:center;gap:16px}
.logo{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);background:var(--accent-dim);padding:6px 12px;border-radius:4px;border:1px solid #1a3d2e}
.title{font-size:18px;font-weight:700;color:var(--text-bright);letter-spacing:-.02em}
.subtitle{font-size:11px;color:var(--text-dim);font-family:var(--font-mono);margin-top:2px}
.header-stats{display:flex;gap:16px;font-family:var(--font-mono);font-size:11px}
.stat{display:flex;flex-direction:column;align-items:center;gap:2px}
.stat-val{font-size:20px;font-weight:700;color:var(--text-bright);line-height:1}
.stat-label{color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;font-size:9px}

/* Filters */
.filters{padding:16px 32px;border-bottom:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap;align-items:center;background:var(--surface)}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-label{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em}
select,input[type="text"]{
  background:var(--bg);border:1px solid var(--border);color:var(--text);
  padding:6px 10px;border-radius:4px;font-family:var(--font-sans);font-size:12px;
  outline:none;transition:border-color .15s;
}
select:hover,input:hover{border-color:var(--border-hover)}
select:focus,input:focus{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-dim)}
input[type="text"]{width:200px}
.filter-reset{background:none;border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:4px;cursor:pointer;font-size:11px;font-family:var(--font-mono);transition:all .15s}
.filter-reset:hover{border-color:var(--text-dim);color:var(--text)}
.filter-count{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);margin-left:auto}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead{position:sticky;top:0;z-index:10}
th{
  text-align:left;padding:10px 14px;color:var(--text-dim);font-weight:600;
  font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;
  background:var(--surface);border-bottom:2px solid var(--border);white-space:nowrap;
  cursor:pointer;user-select:none;transition:color .15s;
}
th:hover{color:var(--text)}
th .sort-arrow{opacity:.3;margin-left:4px;font-size:9px}
th.sorted .sort-arrow{opacity:1;color:var(--accent)}
td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle;transition:background .1s}
tr.data-row{cursor:pointer}
tr.data-row:hover td{background:#0e1218}
tr.data-row.expanded td{background:var(--surface);border-bottom-color:transparent}

/* Type badges */
.type-badge{
  display:inline-block;padding:2px 8px;border-radius:3px;
  font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.04em;
}
.type-primitive{background:var(--green-bg);color:var(--green);border:1px solid #133d2a}
.type-breakdown{background:var(--blue-bg);color:var(--blue);border:1px solid #1a2d4a}
.type-derived{background:var(--yellow-bg);color:var(--yellow);border:1px solid #332b0a}
.type-catalog{background:var(--gray-bg);color:var(--gray);border:1px solid #1f242d}
.type-transform{background:#1a0f2e;color:#a78bfa;border:1px solid #2d1f5e}

/* Status dots */
.status{display:flex;align-items:center;gap:6px;white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-live{background:var(--green);box-shadow:0 0 6px var(--green)}
.dot-have-data{background:var(--blue)}
.dot-review{background:var(--yellow)}
.dot-broken{background:var(--red)}
.dot-missing,.dot-unknown{background:var(--gray)}

/* Inline editable cells */
td select{
  background:transparent;border:1px solid transparent;color:var(--text);
  padding:2px 4px;border-radius:3px;font-size:12px;cursor:pointer;
  width:100%;
}
td select:hover{border-color:var(--border)}
td select:focus{border-color:var(--accent)}
.editable-text{
  background:transparent;border:1px solid transparent;color:var(--text);
  padding:2px 6px;border-radius:3px;font-size:12px;width:100%;
  font-family:var(--font-sans);outline:none;
}
.editable-text:hover{border-color:var(--border)}
.editable-text:focus{border-color:var(--accent);background:var(--bg)}
.save-flash{animation:flash .6s ease}
@keyframes flash{0%{background:var(--accent-dim)}100%{background:transparent}}

/* Expand panel */
.expand-row td{padding:0;background:var(--surface);border-bottom:1px solid var(--border)}
.expand-panel{padding:16px 20px 20px;animation:slideDown .2s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.expand-section{margin-bottom:14px}
.expand-label{font-family:var(--font-mono);font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.sql-block{
  background:var(--bg);border:1px solid var(--border);border-radius:6px;
  padding:14px 16px;font-family:var(--font-mono);font-size:11.5px;color:#a5f3c4;
  line-height:1.65;overflow-x:auto;white-space:pre-wrap;word-break:break-all;
  max-height:240px;overflow-y:auto;
}
.dep-pills{display:flex;flex-wrap:wrap;gap:6px}
.dep-pill{
  background:var(--blue-bg);border:1px solid #1a2d4a;color:var(--blue);
  padding:3px 10px;border-radius:4px;font-size:11px;font-family:var(--font-mono);
}
.dep-pill.reverse{background:var(--yellow-bg);border-color:#332b0a;color:var(--yellow)}
.no-deps{color:var(--text-dim);font-size:11px;font-style:italic}

/* Breakdown lens buttons */
.lens-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.lens-btn{
  background:var(--bg);border:1px solid var(--border);color:var(--text-dim);
  padding:5px 14px;border-radius:4px;cursor:pointer;font-family:var(--font-mono);
  font-size:11px;transition:all .15s;
}
.lens-btn:hover{border-color:var(--accent);color:var(--accent)}
.lens-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.lens-result{margin-top:10px;overflow-x:auto;max-height:300px;overflow-y:auto}
.lens-result table{font-size:12px}
.lens-result th{background:var(--bg);position:sticky;top:0}
.lens-result td{padding:6px 12px;white-space:nowrap}
.lens-result .num{text-align:right;font-variant-numeric:tabular-nums;font-family:var(--font-mono)}
.lens-loading{color:var(--text-dim);font-size:11px;font-family:var(--font-mono);padding:8px 0}
.dep-pill{cursor:pointer;transition:all .15s}
.dep-pill:hover{filter:brightness(1.3);transform:scale(1.05)}
.notes-area{
  background:var(--bg);border:1px solid var(--border);color:var(--text);
  padding:10px 14px;border-radius:6px;font-family:var(--font-sans);font-size:12.5px;
  width:100%;min-height:60px;resize:vertical;outline:none;line-height:1.6;
}
.notes-area:focus{border-color:var(--accent)}
.notes-area::placeholder{color:var(--text-dim)}

/* Group headers */
.group-header{
  padding:20px 32px 10px;display:flex;align-items:center;gap:12px;
  border-top:1px solid var(--border);
}
.group-header:first-of-type{border-top:none}
.group-title{font-family:var(--font-mono);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.group-count{font-family:var(--font-mono);font-size:11px;color:var(--text-dim)}
.group-primitive .group-title{color:var(--green)}
.group-breakdown .group-title{color:var(--blue)}
.group-derived .group-title{color:var(--yellow)}
.group-catalog .group-title{color:var(--gray)}
.group-transform .group-title{color:#a78bfa}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px}
.loading-spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--font-mono);font-size:11px;color:var(--text-dim)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-dim);font-size:13px}
</style>
</head>
<body>

<div id="app">
  <div class="loading">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading metrics from Supabase...</div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://agkubdpgnpwudzpzcvhs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFna3ViZHBnbnB3dWR6cHpjdmhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDU4MzEsImV4cCI6MjA4ODk4MTgzMX0.tfpIArmqYQn7IHOrIUY6L-Wc4HcpMLXiTR6vKPJLDjY';

const HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation',
};

let allMetrics = [];
let filteredMetrics = [];
let expandedId = null;
let sortCol = 'id';
let sortDir = 'asc';

// --- Data ---
async function loadMetrics() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/metrics?select=*&order=id`, { headers: HEADERS });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  allMetrics = await res.json();
  applyFilters();
}

async function updateMetric(id, fields) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/metrics?id=eq.${id}`, {
    method: 'PATCH',
    headers: HEADERS,
    body: JSON.stringify(fields),
  });
  if (!res.ok) console.error('Update failed:', res.status);
  const updated = await res.json();
  if (updated && updated[0]) {
    const idx = allMetrics.findIndex(m => m.id === id);
    if (idx >= 0) allMetrics[idx] = { ...allMetrics[idx], ...updated[0] };
  }
}

// --- Classification ---
function getType(m) {
  if (m.metric_type && m.metric_type !== 'catalog') {
    return m.metric_type.charAt(0).toUpperCase() + m.metric_type.slice(1);
  }
  // Fallback for rows without metric_type
  if (m.primitive_metric_id) return 'Breakdown';
  if (m.depends_on && m.depends_on.length > 0) return 'Derived';
  if (!m.chart_sql && !m.view_name) return 'Catalog';
  return 'Primitive';
}

function metricName(id) {
  const m = allMetrics.find(x => x.id === id);
  return m ? m.name : `#${id}`;
}

function getDependents(id) {
  return allMetrics.filter(m =>
    m.primitive_metric_id === id ||
    (m.depends_on && m.depends_on.includes(id))
  );
}

// --- Filters & Sort ---
function applyFilters() {
  const stage = document.getElementById('f-stage')?.value || '';
  const status = document.getElementById('f-status')?.value || '';
  const assigned = document.getElementById('f-assigned')?.value || '';
  const type = document.getElementById('f-type')?.value || '';
  const search = (document.getElementById('f-search')?.value || '').toLowerCase();

  filteredMetrics = allMetrics.filter(m => {
    if (stage && m.stage !== stage) return false;
    if (status && m.status !== status) return false;
    if (assigned === '__unassigned' && m.assigned_to) return false;
    if (assigned && assigned !== '__unassigned' && m.assigned_to !== assigned) return false;
    if (type && getType(m) !== type) return false;
    if (search && !m.name.toLowerCase().includes(search) && !(m.source || '').toLowerCase().includes(search)) return false;
    return true;
  });

  filteredMetrics.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'type') { va = getType(a); vb = getType(b); }
    if (va == null) va = '';
    if (vb == null) vb = '';
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  const countEl = document.getElementById('filter-count');
  if (countEl) countEl.textContent = `${filteredMetrics.length} of ${allMetrics.length} metrics`;
  renderTable();
}

function setSort(col) {
  if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortCol = col; sortDir = 'asc'; }
  applyFilters();
}

// --- Render ---
function renderApp() {
  const stages = [...new Set(allMetrics.map(m => m.stage))].sort();
  const statuses = [...new Set(allMetrics.map(m => m.status))].sort();

  const counts = {
    total: allMetrics.length,
    live: allMetrics.filter(m => m.status === 'live').length,
    haveData: allMetrics.filter(m => m.status === 'have-data').length,
    missing: allMetrics.filter(m => m.status === 'missing').length,
  };

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div>
        <div class="header-left">
          <div class="logo">Method</div>
          <div>
            <div class="title">Metric Tracker</div>
            <div class="subtitle">${allMetrics.length} metrics &middot; Supabase registry</div>
          </div>
        </div>
      </div>
      <div id="bq-status" style="margin-right:16px"></div>
      <div class="header-stats">
        <div class="stat"><div class="stat-val" style="color:var(--green)">${counts.live}</div><div class="stat-label">Live</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--blue)">${counts.haveData}</div><div class="stat-label">Have Data</div></div>
        <div class="stat"><div class="stat-val" style="color:var(--gray)">${counts.missing}</div><div class="stat-label">Missing</div></div>
        <div class="stat"><div class="stat-val">${counts.total}</div><div class="stat-label">Total</div></div>
      </div>
    </div>

    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">Stage</span>
        <select id="f-stage" onchange="applyFilters()">
          <option value="">All</option>
          ${stages.map(s => `<option value="${s}">${s}</option>`).join('')}
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Status</span>
        <select id="f-status" onchange="applyFilters()">
          <option value="">All</option>
          ${statuses.map(s => `<option value="${s}">${s}</option>`).join('')}
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Assigned</span>
        <select id="f-assigned" onchange="applyFilters()">
          <option value="">All</option>
          <option value="Nic">Nic</option>
          <option value="Justin">Justin</option>
          <option value="__unassigned">Unassigned</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Type</span>
        <select id="f-type" onchange="applyFilters()">
          <option value="">All</option>
          <option value="Primitive">Primitive</option>
          <option value="Breakdown">Breakdown</option>
          <option value="Transform">Transform</option>
          <option value="Derived">Derived</option>
          <option value="Catalog">Catalog</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Search</span>
        <input type="text" id="f-search" placeholder="Filter by name..." oninput="applyFilters()">
      </div>
      <button class="filter-reset" onclick="resetFilters()">Reset</button>
      <div class="filter-count" id="filter-count"></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  `;

  renderThead();
  applyFilters();
  updateBqStatus();
}

function renderThead() {
  const cols = [
    { key: 'id', label: 'ID', width: '50px' },
    { key: 'name', label: 'Name' },
    { key: 'type', label: 'Type', width: '100px' },
    { key: 'stage', label: 'Stage', width: '100px' },
    { key: 'source', label: 'Source' },
    { key: 'priority', label: 'Priority', width: '90px' },
    { key: 'assigned_to', label: 'Assigned', width: '100px' },
    { key: 'status', label: 'Status', width: '110px' },
    { key: 'verified_at', label: 'Verified', width: '90px' },
  ];

  document.getElementById('thead-row').innerHTML = cols.map(c =>
    `<th style="${c.width ? 'width:'+c.width : ''}" class="${sortCol === c.key ? 'sorted' : ''}" onclick="setSort('${c.key}')">
      ${c.label}<span class="sort-arrow">${sortCol === c.key ? (sortDir === 'asc' ? '&#9650;' : '&#9660;') : '&#9650;'}</span>
    </th>`
  ).join('');
}

function renderTable() {
  const tbody = document.getElementById('tbody');
  if (!tbody) return;

  if (filteredMetrics.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="empty-state">No metrics match your filters.</td></tr>';
    return;
  }

  // Group by type
  const groups = [
    { key: 'Primitive', label: 'Primitives', cls: 'group-primitive' },
    { key: 'Breakdown', label: 'Breakdowns', cls: 'group-breakdown' },
    { key: 'Transform', label: 'Transforms', cls: 'group-transform' },
    { key: 'Derived', label: 'Derived', cls: 'group-derived' },
    { key: 'Catalog', label: 'Catalog', cls: 'group-catalog' },
  ];

  const grouped = {};
  for (const m of filteredMetrics) {
    const t = getType(m);
    if (!grouped[t]) grouped[t] = [];
    grouped[t].push(m);
  }

  let html = '';
  for (const group of groups) {
    const items = grouped[group.key];
    if (!items || items.length === 0) continue;

    html += `<tr><td colspan="9" style="padding:0">
      <div class="group-header ${group.cls}">
        <span class="group-title">${group.label}</span>
        <span class="group-count">${items.length}</span>
      </div>
    </td></tr>`;

    for (const m of items) {
      html += renderMetricRow(m);
      if (expandedId === m.id) html += renderExpandPanel(m);
    }
  }

  tbody.innerHTML = html;
  renderThead();
}

function renderMetricRow(m) {
  const type = getType(m);
  const typeCls = `type-${type.toLowerCase()}`;
  const dotCls = `dot-${(m.status || 'unknown').replace(' ', '-')}`;
  const verified = m.verified_at ? new Date(m.verified_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : '—';
  const isExpanded = expandedId === m.id;

  return `<tr class="data-row ${isExpanded ? 'expanded' : ''}" data-id="${m.id}" onclick="toggleExpand(${m.id}, event)">
    <td style="font-family:var(--font-mono);color:var(--text-dim);font-size:11px">${m.id}</td>
    <td style="font-weight:600;color:var(--text-bright)">${esc(m.name)}</td>
    <td><span class="type-badge ${typeCls}">${type}</span></td>
    <td>${m.stage || '—'}</td>
    <td><input class="editable-text" value="${esc(m.source || '')}" placeholder="—" onclick="event.stopPropagation()" onchange="saveField(${m.id},'source',this.value,this)"></td>
    <td>
      <select onclick="event.stopPropagation()" onchange="saveField(${m.id},'priority',this.value,this)">
        <option value="high"${m.priority==='high'?' selected':''}>High</option>
        <option value="medium"${m.priority==='medium'||!m.priority?' selected':''}>Medium</option>
        <option value="low"${m.priority==='low'?' selected':''}>Low</option>
      </select>
    </td>
    <td>
      <select onclick="event.stopPropagation()" onchange="saveField(${m.id},'assigned_to',this.value||null,this)">
        <option value=""${!m.assigned_to?' selected':''}>—</option>
        <option value="Nic"${m.assigned_to==='Nic'?' selected':''}>Nic</option>
        <option value="Justin"${m.assigned_to==='Justin'?' selected':''}>Justin</option>
      </select>
    </td>
    <td>
      <div class="status">
        <span class="dot ${dotCls}"></span>
        <select onclick="event.stopPropagation()" onchange="saveField(${m.id},'status',this.value,this)" style="flex:1">
          ${['live','have-data','review','missing','broken','unknown'].map(s =>
            `<option value="${s}"${m.status===s?' selected':''}>${s}</option>`
          ).join('')}
        </select>
      </div>
    </td>
    <td style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">${verified}</td>
  </tr>`;
}

function renderExpandPanel(m) {
  const panelId = `expand-${m.id}`;

  const deps = (m.depends_on || []).map(id =>
    `<span class="dep-pill" onclick="event.stopPropagation();scrollToMetric(${id})" title="Click to jump to ${metricName(id)}">${metricName(id)}</span>`
  ).join('') || '<span class="no-deps">None</span>';

  let parentHtml = '';
  if (m.primitive_metric_id) {
    parentHtml = `<div class="expand-section">
      <div class="expand-label">Parent Primitive</div>
      <div class="dep-pills"><span class="dep-pill" onclick="event.stopPropagation();scrollToMetric(${m.primitive_metric_id})" title="Click to jump">${metricName(m.primitive_metric_id)}</span></div>
    </div>`;
  }

  const dependents = getDependents(m.id);
  const revDeps = dependents.length > 0
    ? dependents.map(d => {
        const dtype = getType(d);
        const cls = dtype === 'Derived' ? 'reverse' : '';
        return `<span class="dep-pill ${cls}" onclick="event.stopPropagation();scrollToMetric(${d.id})" title="${dtype}: ${d.name}">${d.name}</span>`;
      }).join('')
    : '<span class="no-deps">Nothing depends on this</span>';

  const viewInfo = m.view_name
    ? `<div class="expand-section"><div class="expand-label">BQ View</div><div style="font-family:var(--font-mono);font-size:12px;color:var(--accent)">revenue.${m.view_name}</div></div>`
    : '';

  return `<tr class="expand-row"><td colspan="9"><div class="expand-panel" id="${panelId}">
    ${viewInfo}
    ${parentHtml}
    <div class="expand-section">
      <div class="expand-label">SQL Definition ${m.view_name ? `<span style="font-size:9px;color:var(--text-dim);text-transform:none;letter-spacing:0">(BQ view: revenue.${m.view_name})</span>` : ''}</div>
      <div class="sql-block" id="sql-${m.id}">${esc(m.view_definition || m.chart_sql || 'No SQL definition')}</div>
    </div>
    <div class="expand-section">
      <div class="expand-label">Depends On</div>
      <div class="dep-pills">${deps}</div>
    </div>
    <div class="expand-section">
      <div class="expand-label">Used By (${dependents.length})</div>
      <div class="dep-pills">${revDeps}</div>
    </div>
    ${PRIMITIVE_SCHEMA[m.view_name] ? `<div class="expand-section">
      <div class="expand-label">Breakdowns</div>
      <div class="lens-bar">${getLensButtons(m.view_name)}</div>
      <div class="lens-result"></div>
    </div>` : ''}
    <div class="expand-section">
      <div class="expand-label">Notes</div>
      <textarea class="notes-area" placeholder="Add notes, context, verification details..." onclick="event.stopPropagation()" onchange="saveField(${m.id},'notes',this.value,this)">${esc(m.notes || '')}</textarea>
    </div>
  </div></td></tr>`;
}

// --- Breakdown lens definitions ---
// Each primitive declares its date column and available dimensions
const PRIMITIVE_SCHEMA = {
  'v_trials': { dateCol: 'SignupDate', dims: ['Channel','SignupCountry','CustDatIndustry','SyncType','Vertical'] },
  'v_syncs': { dateCol: 'SyncDate', dims: ['SyncType','SyncTypeRegion','SignupCountry','Vertical'] },
  'v_conversions': { dateCol: 'FirstSaaSInvoiceTxnDate', dims: ['Channel','SignupCountry','CustDatIndustry','Vertical'] },
  'v_cancellations': { dateCol: 'CancellationDate', dims: ['SignupCountry','CustDatIndustry'] },
  'v_bom_customers': { dateCol: 'TxnDate', dims: [] },
  'v_new_net_saas': { dateCol: 'TxnDate', dims: [], agg: 'ROUND(SUM(SaaSAmount),0)' },
  'v_new_dep_revenue': { dateCol: 'TxnDate', dims: [], agg: 'ROUND(SUM(SaaSAmount),0)' },
  'v_total_net_saas': { dateCol: 'TxnDate', dims: [], agg: 'ROUND(SUM(SaaSAmount + SaaSExpense),0)' },
  'v_total_dep_revenue': { dateCol: 'TxnDate', dims: [], agg: 'ROUND(SUM(SaaSAmount),0)' },
};

function getLensButtons(viewName) {
  const schema = PRIMITIVE_SCHEMA[viewName];
  if (!schema) return '';
  const isCount = !schema.agg;
  const lenses = [
    { key: 'monthly', label: 'Monthly' },
    { key: 'weekly', label: 'Weekly' },
    { key: 'yoy', label: 'Year over Year' },
  ];
  schema.dims.forEach(d => lenses.push({ key: `dim_${d}`, label: `By ${d}` }));
  return lenses.map(l =>
    `<button class="lens-btn" onclick="event.stopPropagation();runLens('${viewName}','${l.key}',this)">${l.label}</button>`
  ).join('');
}

async function runLens(viewName, lensKey, btnEl) {
  const schema = PRIMITIVE_SCHEMA[viewName];
  if (!schema || !bqToken) return;

  // Toggle active state
  const bar = btnEl.parentElement;
  bar.querySelectorAll('.lens-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');

  const resultEl = btnEl.closest('.expand-panel').querySelector('.lens-result');
  if (!resultEl) return;
  resultEl.innerHTML = '<div class="lens-loading">Running query...</div>';

  const dc = schema.dateCol;
  const agg = schema.agg || 'COUNT(*)';
  const table = `\`project-for-method-dw.revenue.${viewName}\``;
  let sql;

  if (lensKey === 'monthly') {
    sql = `SELECT FORMAT_DATE('%Y-%m', ${dc}) AS period, ${agg} AS value FROM ${table} GROUP BY 1 ORDER BY 1`;
  } else if (lensKey === 'weekly') {
    sql = `SELECT FORMAT_DATE('%Y-W%V', ${dc}) AS week, ${agg} AS value FROM ${table} WHERE ${dc} >= DATE_SUB(CURRENT_DATE(), INTERVAL 90 DAY) GROUP BY 1 ORDER BY 1`;
  } else if (lensKey === 'yoy') {
    sql = `SELECT EXTRACT(YEAR FROM ${dc}) AS year, FORMAT_DATE('%b', ${dc}) AS month, ${agg} AS value FROM ${table} GROUP BY 1, 2, EXTRACT(MONTH FROM ${dc}) ORDER BY 1, EXTRACT(MONTH FROM ${dc})`;
  } else if (lensKey.startsWith('dim_')) {
    const dim = lensKey.replace('dim_', '');
    sql = `SELECT ${dim}, ${agg} AS value FROM ${table} WHERE ${dc} >= DATE_TRUNC(CURRENT_DATE(), MONTH) GROUP BY 1 ORDER BY value DESC LIMIT 20`;
  }

  if (!sql) { resultEl.innerHTML = ''; return; }

  try {
    const rows = await queryBq(sql);
    if (!rows || rows.length === 0) {
      resultEl.innerHTML = '<div class="lens-loading">No data returned</div>';
      return;
    }
    const cols = Object.keys(rows[0]);
    resultEl.innerHTML = `<table>
      <thead><tr>${cols.map(c => `<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${rows.map(r => `<tr>${cols.map(c => {
        const v = r[c];
        const isNum = !isNaN(v) && v !== null && v !== '';
        return `<td class="${isNum ? 'num' : ''}">${isNum ? Number(v).toLocaleString() : (v || '—')}</td>`;
      }).join('')}</tr>`).join('')}</tbody>
    </table>`;
  } catch (e) {
    resultEl.innerHTML = `<div class="lens-loading" style="color:var(--red)">Query failed: ${e.message}</div>`;
  }
}

// Fetch live SQL definition from BQ INFORMATION_SCHEMA
async function loadViewSql(metricId, viewName) {
  const el = document.getElementById(`sql-${metricId}`);
  if (!el || !viewName) return;

  if (!bqToken) {
    el.textContent = `-- BQ not connected. View: revenue.${viewName}\nSELECT * FROM \`project-for-method-dw.revenue.${viewName}\``;
    return;
  }

  try {
    const sql = `SELECT view_definition FROM \`project-for-method-dw.revenue.INFORMATION_SCHEMA.VIEWS\` WHERE table_name = '${viewName}'`;
    const rows = await queryBq(sql);
    if (rows && rows.length > 0 && rows[0].view_definition) {
      el.textContent = rows[0].view_definition;
    } else {
      el.textContent = `-- View not found in INFORMATION_SCHEMA\n-- Expected: revenue.${viewName}`;
    }
  } catch (e) {
    el.textContent = `-- Failed to load from BQ: ${e.message}\n-- View: revenue.${viewName}`;
  }
}

// Minimal BQ query support (OAuth2 token reuse if available)
let bqToken = null;

const BQ_CLIENT_ID = '546732685010-nojjfak7esmun2taour8r5pakrsrg3aq.apps.googleusercontent.com';
const BQ_SCOPES = 'https://www.googleapis.com/auth/bigquery.readonly';

function initBqAuth() {
  const stored = localStorage.getItem('bq_access_token');
  if (stored) {
    bqToken = stored;
    updateBqStatus();
  }
}

function connectBq() {
  if (!window.google?.accounts?.oauth2) {
    alert('Google Identity Services not loaded. Check your internet connection.');
    return;
  }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: BQ_CLIENT_ID,
    scope: BQ_SCOPES,
    callback: (response) => {
      if (response.access_token) {
        bqToken = response.access_token;
        localStorage.setItem('bq_access_token', bqToken);
        updateBqStatus();
      }
    },
  });
  client.requestAccessToken();
}

function updateBqStatus() {
  const el = document.getElementById('bq-status');
  if (el) {
    el.innerHTML = bqToken
      ? '<span style="color:var(--green)">&#9679; BQ Connected</span>'
      : '<button onclick="connectBq()" style="background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);padding:4px 12px;border-radius:4px;cursor:pointer;font-family:var(--font-mono);font-size:11px">Connect BigQuery</button>';
  }
}

async function queryBq(sql) {
  if (!bqToken) return null;
  const res = await fetch('https://bigquery.googleapis.com/bigquery/v2/projects/project-for-method-dw/queries', {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${bqToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: sql, useLegacySql: false, maxResults: 100 }),
  });
  if (!res.ok) {
    if (res.status === 401) { bqToken = null; localStorage.removeItem('bq_access_token'); }
    throw new Error(`BQ ${res.status}`);
  }
  const data = await res.json();
  if (!data.rows) return [];
  const fields = data.schema.fields.map(f => f.name);
  return data.rows.map(r => {
    const obj = {};
    fields.forEach((f, i) => obj[f] = r.f[i].v);
    return obj;
  });
}

// --- Actions ---
function toggleExpand(id, event) {
  if (event.target.tagName === 'SELECT' || event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;
  expandedId = expandedId === id ? null : id;
  renderTable();
}

function scrollToMetric(id) {
  // Clear filters so the metric is visible
  resetFilters();
  expandedId = id;
  renderTable();
  // Find the row and scroll to it
  setTimeout(() => {
    const row = document.querySelector(`tr[data-id="${id}"]`);
    if (row) {
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      row.style.outline = '2px solid var(--accent)';
      setTimeout(() => row.style.outline = '', 2000);
    }
  }, 50);
}

async function saveField(id, field, value, el) {
  await updateMetric(id, { [field]: value });
  if (el) { el.classList.add('save-flash'); setTimeout(() => el.classList.remove('save-flash'), 600); }
  if (field === 'status' || field === 'assigned_to') {
    // Re-render stats
    const liveCount = allMetrics.filter(m => m.status === 'live').length;
    const haveCount = allMetrics.filter(m => m.status === 'have-data').length;
    const missCount = allMetrics.filter(m => m.status === 'missing').length;
    document.querySelectorAll('.stat-val').forEach((el, i) => {
      if (i === 0) el.textContent = liveCount;
      if (i === 1) el.textContent = haveCount;
      if (i === 2) el.textContent = missCount;
    });
  }
}

function resetFilters() {
  document.getElementById('f-stage').value = '';
  document.getElementById('f-status').value = '';
  document.getElementById('f-assigned').value = '';
  document.getElementById('f-type').value = '';
  document.getElementById('f-search').value = '';
  applyFilters();
}

function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- Init ---
initBqAuth();
loadMetrics().then(renderApp).catch(e => {
  document.getElementById('app').innerHTML = `<div class="loading"><div style="color:var(--red)">Failed to load: ${e.message}</div></div>`;
});
</script>
