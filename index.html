<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Method Metrics</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#06080a;color:#c8cdd3;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{text-align:center;max-width:480px;padding:40px 20px}
.logo{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#34d399;background:#0a1f17;padding:6px 14px;border-radius:4px;border:1px solid #1a3d2e;display:inline-block;margin-bottom:20px}
h1{font-size:28px;font-weight:700;color:#edf0f3;margin-bottom:8px;letter-spacing:-.02em}
p{color:#5a6370;font-size:14px;margin-bottom:36px;line-height:1.6}
.links{display:flex;flex-direction:column;gap:12px}
a{display:block;padding:16px 24px;background:#0c0f12;border:1px solid #1a1e24;border-radius:8px;color:#edf0f3;text-decoration:none;font-weight:600;font-size:15px;transition:all .15s;text-align:left}
a:hover{border-color:#34d399;background:#0a1210}
a .desc{font-size:12px;color:#5a6370;font-weight:400;margin-top:4px}
a .arrow{float:right;color:#34d399;font-size:18px}
</style>
</head>
<body>
<div class="container">
  <div class="logo">Method</div>
  <h1>Metrics Hub</h1>
  <p>Single source of truth for Method's revenue and marketing metrics.</p>
  <div class="links">
    <a href="tracker.html">
      <span class="arrow">&rarr;</span>
      Metric Tracker
      <div class="desc">Inventory, assign, and verify all metrics</div>
    </a>
    <a href="charts.html">
      <span class="arrow">&rarr;</span>
      Charts
      <div class="desc">Pre-built dashboards, interactive charts, and chart builder</div>
    </a>
  </div>
</div>
</body>
</html>
